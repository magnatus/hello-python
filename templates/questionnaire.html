{% extends "base.html" %}

{% block title %}Анкета — My First App{% endblock %}

{% block content %}
    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-3xl font-bold text-green-500 mb-6">Мини-анкета</h1>

        <form id="questionnaire-form" class="flex flex-col gap-5"></form>

        <p id="error-msg" class="hidden mt-4 text-red-500 text-sm"></p>

        <div id="thank-you" class="hidden text-center py-4">
            <p class="text-2xl font-semibold text-green-500">Спасибо за ответы!</p>
        </div>
    </div>

    <script>
        const form = document.getElementById("questionnaire-form");
        const thankYou = document.getElementById("thank-you");
        const errorMsg = document.getElementById("error-msg");

        fetch("/api/questions")
            .then(r => r.json())
            .then(questions => {
                questions.forEach(q => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "flex flex-col gap-1";

                    const label = document.createElement("label");
                    label.textContent = q.text;
                    label.className = "text-sm font-medium text-gray-700";

                    const input = document.createElement("input");
                    input.type = "text";
                    input.name = "q" + q.id;
                    input.dataset.id = q.id;
                    input.className = "border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400";

                    wrapper.appendChild(label);
                    wrapper.appendChild(input);
                    form.appendChild(wrapper);
                });

                const button = document.createElement("button");
                button.type = "submit";
                button.textContent = "Отправить";
                button.className = "mt-2 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-lg px-4 py-2 transition-colors";
                form.appendChild(button);
            });

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const inputs = form.querySelectorAll("input");
            const data = {};
            inputs.forEach(input => {
                data[input.dataset.id] = input.value;
            });

            fetch("/api/answers", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data),
            }).then(r => r.json()).then(result => {
                if (result.status === "ok") {
                    form.style.display = "none";
                    errorMsg.classList.add("hidden");
                    thankYou.classList.remove("hidden");
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.classList.remove("hidden");
                }
            });
        });
    </script>
{% endblock %}
